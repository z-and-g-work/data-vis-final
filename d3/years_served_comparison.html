<!DOCTYPE html>
<div id="container"></div>
<script type="module">

    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import {getMembersFromYear, getYearsServed} from "../shared/getmembers.js";
    const container = document.getElementById("container");

    // Declare the chart dimensions and margins.
    const width = 640;
    const height = 400;
    const marginTop = 20;
    const marginRight = 20;
    const marginBottom = 30;
    const marginLeft = 60;

    //todo: get this data from somewhere else
    const year = 2024;
    const chamber = "Senate"

    //get all data
    const data = await d3.json("/public/data/members.json");
    //get members from specified year
    const filteredData = getMembersFromYear(chamber, year, data);
    //get the years members served in each chamber
    const yearsServed = getYearsServed(year, filteredData);

    //sort members into bins based on age
    const bin = d3.bin().domain([25, 110]).thresholds([31, 41, 51, 61, 71, 81]).value(d => d[1]);
    const bins = bin(yearsServed);

    //get average years served for each bin to use in chart
    const yearsServedAverages = [];
    bins.forEach(bin => {
        let totalYearsHouse = 0;
        let totalYearsSenate = 0;
        bin.forEach(member => {
            totalYearsHouse += member[2];
            totalYearsSenate += member[3];
        })

        const averageYearsHouse = bin.length === 0 ? 0 : Math.round(totalYearsHouse / bin.length);
        const averageYearsSenate = bin.length === 0 ? 0 : Math.round(totalYearsSenate / bin.length);
        yearsServedAverages.push([averageYearsHouse, averageYearsSenate])
    })

    //set names of each bin
    const xLabels = bins.map((d, i) => {
        if (i === 0) {
            return "<= 31"
        }
        else if (i === bins.length - 1) {
            return "> 80"
        }
        else {
            return `${d.x0}-${d.x1 - 1}`}
    })

    const x = d3.scaleBand()
        .domain(xLabels)
        .range([marginLeft, width - marginRight]);

    const y = d3.scaleLinear()
        .domain([0, 50])
        .range([height - marginBottom, marginTop]);

    const svg = d3.create("svg")
        .attr("width", width + 500)
        .attr("height", height + 25);

    //create legend
    const keys = ["Senate", "House of Representatives"];
    const color = d3.scaleOrdinal().domain(keys).range(["#00b894", "#a29bfe"]);
    const iconSize = 20;
    svg.append("g")
        .selectAll("rect")
        .data(keys)
        .enter()
        .append("rect")
        .attr("x", marginLeft + 20)
        .attr("y", (d,i) => { return marginTop + i*(iconSize + 5)})
        .attr("width", iconSize)
        .attr("height", iconSize)
        .style("fill", d => { return color(d)});

    svg.append("g")
        .selectAll("text")
        .data(keys)
        .enter()
        .append("text")
        .attr("x", marginLeft + 45)
        .attr("y", (d,i) => { return marginTop + i*(20 + 5) + 15})
        .attr("width", 20)
        .attr("height", 20)
        .text(d => d)
        .style("font-size", "13px")
        .style("font-family", "Arial");

    //create labels
    svg.append("text")
        .attr("x", width/2 - 30)
        .attr("y", height + 20)
        .text("Age Range")
        .style("font-family", "Arial");

    svg.append("text")
        .attr("transform", "rotate(-90)")
        .attr("y", 20)
        .attr("x", -height/2 - 35)
        .text("Years Served")
        .style("font-family", "Arial");

    //create x axis
    svg.append("g")
        .attr("transform", `translate(0,${height - marginBottom})`)
        .call(d3.axisBottom(x).ticks(6));

    //create y axis
    svg.append("g")
        .attr("transform", `translate(${marginLeft},0)`)
        .call(d3.axisLeft(y).ticks(5));

    //create each house bar
    svg.append("g")
        .attr("fill", "#a29bfe")
        .selectAll()
        .data(yearsServedAverages)
        .join("rect")
        .attr("x", (d, i) => x(xLabels[i]))
        .attr("y", d => y(d[0]))
        .attr("stroke", "black")
        .attr("stroke-width", 1)
        .attr("height", d => y(0) - y(d[0]))
        .attr("width", x.bandwidth())

    //create each senate bar
    svg.append("g")
        .attr("fill", "#00b894")
        .selectAll()
        .data(yearsServedAverages)
        .join("rect")
        .attr("x", (d, i) => x(xLabels[i]))
        .attr("y", d => y(d[0] + d[1]))
        .attr("stroke", "black")
        .attr("stroke-width", 1)
        .attr("height", d => y(d[0]) - y(d[0] + d[1]))
        .attr("width", x.bandwidth())

    container.append(svg.node());

</script>
