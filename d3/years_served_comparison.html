<!DOCTYPE html>
<div id="container"></div>
<script type="module">

    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import {getMembersFromYear, getYearsServed} from "../shared/getmembers.js";
    const container = document.getElementById("container");

    // Declare the chart dimensions and margins.
    const width = 640;
    const height = 400;
    const marginTop = 20;
    const marginRight = 20;
    const marginBottom = 30;
    const marginLeft = 60;

    //todo: get this data from somewhere else
    const year = 2004;
    const chamber = "Senate"

    //GET ALL DATA
    const data = await d3.json("/public/data/members.json");
    console.log(data)

    const filteredData = getMembersFromYear(chamber, year, data);

    const yearsServed = getYearsServed(year, filteredData);
    console.log(yearsServed);
    console.log("-------------------------------");

    console.log(filteredData)
    // const sortedFilteredData = filteredData.sort((a, b) => a.state.localeCompare(b.state));
    // console.log(sortedFilteredData)

    //get ages of each member and sort them into bins
    const ages = filteredData.map(d => year - d.yob)
    console.log(ages)
    const bin = d3.bin().domain([25, 110]).thresholds([31, 41, 51, 61, 71, 81]);
    const bins = bin(ages);

    //set names of each bin
    const xLabels = bins.map((d, i) => {
        if (i === 0) {
            return "<= 31"
        }
        else if (i === bins.length - 1) {
            return "> 80"
        }
        else {
            return `${d.x0}-${d.x1 - 1}`}
    })

    const x = d3.scaleBand()
        .domain(xLabels)
        .range([marginLeft, width - marginRight]);

    const y = d3.scaleLinear()
        .domain([0, (chamber === "Senate" ? 50 : 200)])
        .range([height - marginBottom, marginTop]);

    const svg = d3.create("svg")
        .attr("width", width)
        .attr("height", height + 25);

    svg.append("text")
        .attr("x", width/2 - 30)
        .attr("y", height + 20)
        .text("Age Range")
        .style("font-family", "Arial");

    svg.append("text")
        .attr("transform", "rotate(-90)")
        .attr("y", 20)
        .attr("x", -height/2 - 35)
        .text("Years Served")
        .style("font-family", "Arial");

    //create x axis
    svg.append("g")
        .attr("transform", `translate(0,${height - marginBottom})`)
        .call(d3.axisBottom(x).ticks(6));

    //create y axis
    svg.append("g")
        .attr("transform", `translate(${marginLeft},0)`)
        .call(d3.axisLeft(y).ticks(5));

    // //create each bar
    // svg.append("g")
    //     .attr("fill", "#0984e3")
    //     .selectAll()
    //     .data(bins)
    //     .join("rect")
    //     .attr("x", (d, i) => x(xLabels[i]))
    //     .attr("y", d => y(d.length))
    //     .attr("stroke", "black")
    //
    //     .attr("stroke-width", 1)
    //     .attr("height", d => y(0) - y(d.length))
    //     .attr("width", x.bandwidth())

    container.append(svg.node());

</script>
