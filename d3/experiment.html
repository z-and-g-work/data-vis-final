<!DOCTYPE html>
<div id="container"></div>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<!-- <script type="module"> -->

<script>
    console.log(d3); // test if d3 is loaded

    const width = 1000;
    const height = 1000; 

    const frame = d3.select("#container")
    .append("svg")
    .attr("width", width)
    .attr("height", height);

    frame.append("rect")
    .attr("x", 0)
    .attr("y", 0)
    .attr("width", width)
    .attr("height", height)
    .attr("fill", "green");

    // head
    frame.append("path")
    .attr("d", "M 100 700 L 100 300 Q 100 100, 300 100 L 400 100 Q 600 100, 600 300 L 600 700 Z")
    .attr("fill", "green");

</script>
