<!DOCTYPE html>
<div id="container"></div>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<!-- <script type="module"> -->

<script>
    console.log(d3); // test if d3 is loaded

    const width = 1000;
    const height = 1000; 

    const frame = d3.select("#container")
    .append("svg")
    .attr("width", width)
    .attr("height", height);

    frame.append("rect")
    .attr("x", 0)
    .attr("y", 0)
    .attr("width", width)
    .attr("height", height)
    .attr("fill", "green");

    function make_person (x, y) {
        frame.append("path")
        .attr("d", "M11 1A1 1 0 0 0 11 9A1 1 0 0 0 11 1M1 22L1 18Q1 12 6 12L16 12Q21 12 21 18L21 22")
        .attr("transform", `translate(${x}, ${y})`)
        .attr("fill", "purple");
    }

    // mapped everything on desmos and had claude use my points to the desmos line. it didnt do a great job, but hey proof of concept

    const xScale = d3.scaleLinear().domain([-20, 20]).range([0, 1000]);
    const yScale = d3.scaleLinear().domain([0, 20]).range([1000, 0]);

    const rowCurves = [
        { a: -0.05,  b: 3  },
        { a: -0.045, b: 5  },
        { a: -0.04,  b: 7  },
        { a: -0.035, b: 9  },
        { a: -0.03,  b: 11 },
        { a: -0.025, b: 13 },
        { a: -0.02,  b: 15 },
        { a: -0.015, b: 17 },
        { a: -0.01,  b: 19 },
    ];

    const cols = 32;

    function make_people() {
        for (let row = 0; row < rowCurves.length; row++) {
            const { a, b } = rowCurves[row];

            for (let col = 0; col < cols; col++) {
                // Map col index to math x: -20 to 20
                const mathX = -20 + (col / (cols - 1)) * 40;
                const mathY = a * mathX * mathX + b;

                const svgX = xScale(mathX);
                const svgY = yScale(mathY);

                make_person(svgX - 11, svgY - 11); // center the person icon
            }
        }
    }

    make_people();

</script>
