<!DOCTYPE html>
<div id="container"></div>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<!-- <script type="module"> -->

<script>
    console.log(d3); // test if d3 is loaded

    const width = 1000;
    const height = 1000; 

    const frame = d3.select("#container")
    .append("svg")
    .attr("width", width)
    .attr("height", height);

    frame.append("rect")
    .attr("x", 0)
    .attr("y", 0)
    .attr("width", width)
    .attr("height", height)
    .attr("fill", "green");

    function make_person (x, y) {
        frame.append("path")
        .attr("d", "M11 1A1 1 0 0 0 11 9A1 1 0 0 0 11 1M1 22L1 18Q1 12 6 12L16 12Q21 12 21 18L21 22")
        .attr("transform", `translate(${x}, ${y})`)
        .attr("fill", "purple");
    }

    function make_people () {
        let row = 0;
        for (let i = 0; i < 100; i++) {
            if (!((i * 60) % 900)) { // make sure these are divisable
                row++;
            };

            make_person((i * 60) % 900, row * 100);
        }
    }

    make_people();

</script>
