<!DOCTYPE html>
<div id="container"></div>
<script type="module">

    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    const container = document.getElementById("container");

    // Declare the chart dimensions and margins.
    const width = 640;
    const height = 400;
    const marginTop = 20;
    const marginRight = 20;
    const marginBottom = 30;
    const marginLeft = 40;

    const year = 1990;


    /*
    ONE MEMBER

    {"yob": "1955", "terms": [{"chamber": "House of Representatives", "congress": 110, "district": 2, "endYear": 2009, "memberType": "Representative", "startYear": 2007, "stateCode": "IN", "stateName": "Indiana"}, {"chamber": "House of Representatives", "congress": 111, "district": 2, "endYear": 2011, "memberType": "Representative", "startYear": 2009, "stateCode": "IN", "stateName": "Indiana"}, {"chamber": "House of Representatives", "congress": 112, "district": 2, "endYear": 2013, "memberType": "Representative", "startYear": 2011, "stateCode": "IN", "stateName": "Indiana"}, {"chamber": "Senate", "congress": 113, "endYear": 2015, "memberType": "Senator", "startYear": 2013, "stateCode": "IN", "stateName": "Indiana"}, {"chamber": "Senate", "congress": 114, "endYear": 2017, "memberType": "Senator", "startYear": 2015, "stateCode": "IN", "stateName": "Indiana"}, {"chamber": "Senate", "congress": 115, "endYear": 2019, "memberType": "Senator", "startYear": 2017, "stateCode": "IN", "stateName": "Indiana"}], "state": "Indiana", "img": "https://www.congress.gov/img/member/d000607_200.jpg", "name": "Joe Donnelly", "district": 0}
     */

    //GET ALL DATA
    const data = await d3.json("/public/data/members.json");
    console.log(data)

    //takes year and chamber (senate or house) and gets every member that served that year
    function getMembersFromYear(chamber, year) {
        const filteredData = data.filter(member => {
            let servedYear = false;
            member.terms.forEach(term => {
                if (term.chamber === chamber && term.startYear <= year && term.endYear > year) {
                    //console.log(member.name)
                    servedYear = true;
                }
            })
            return servedYear;
        })
        return filteredData;
    }

    const filteredData = getMembersFromYear("Senate", year);

    //get ages of each member and sort them into bins
    //todo: make year not hard-coded
    const ages = filteredData.map(d => year - d.yob)
    console.log(ages)
    const bin = d3.bin().domain([25, 110]).thresholds([31, 41, 51, 61, 71, 81]);
    const bins = bin(ages);

    console.log(bins)

    //set names of each bin
    const xLabels = bins.map((d, i) => {
        if (i === 0) {
            return "<= 31"
        }
        else if (i === bins.length - 1) {
            return "> 80"
        }
        else {
            return `${d.x0 + 1}-${d.x1}`}
    })

    const x = d3.scaleBand()
        .domain(xLabels)
        .range([marginLeft, width - marginRight]);

    const y = d3.scaleLinear()
        .domain([0, 50])
        .range([height - marginBottom, marginTop]);

    const svg = d3.create("svg")
        .attr("width", width)
        .attr("height", height);

    //create x axis
    svg.append("g")
        .attr("transform", `translate(0,${height - marginBottom})`)
        .call(d3.axisBottom(x).ticks(6));

    //create y axis
    svg.append("g")
        .attr("transform", `translate(${marginLeft},0)`)
        .call(d3.axisLeft(y).ticks(5));

    //create each bar
    svg.append("g")
        .attr("fill", "#0984e3")
        .selectAll()
        .data(bins)
        .join("rect")
        .attr("x", (d, i) => x(xLabels[i]))
        .attr("y", d => y(d.length))
        .attr("stroke", "black")

        .attr("stroke-width", 1)
        .attr("height", d => y(0) - y(d.length))
        .attr("width", x.bandwidth())

    container.append(svg.node());

</script>
